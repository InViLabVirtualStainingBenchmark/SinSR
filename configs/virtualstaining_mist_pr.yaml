model:
  target: models.unet.UNetModelSwin
  ckpt_path: ~
  teacher_ckpt_path: weights/resshift_realsrx4_s15_v1.pth
  params:
    image_size: 64
    in_channels: 6
    model_channels: 160
    out_channels: 3
    cond_lq: True
    attention_resolutions: [64,32,16,8]
    dropout: 0
    channel_mult: [1, 2, 2, 4]
    num_res_blocks: [2, 2, 2, 2]
    conv_resample: True
    dims: 2
    use_fp16: True
    num_head_channels: 32
    use_scale_shift_norm: True
    resblock_updown: False
    swin_depth: 2
    swin_embed_dim: 192
    window_size: 8
    mlp_ratio: 4

diffusion:
  target: models.script_util.create_gaussian_diffusion
  params:
    sf: 1
    schedule_name: exponential
    schedule_kwargs:
      power: 0.3
    etas_end: 0.99
    steps: 15
    min_noise_level: 0.04
    kappa: 2.0
    weighted_mse: False
    predict_type: xstart
    timestep_respacing: ~
    scale_factor: 1.0
    normalize_input: True
    latent_flag: True

autoencoder:
  target: ldm.models.autoencoder.VQModelTorch
  ckpt_path: weights/autoencoder_vq_f4.pth
  use_fp16: True
  params:
    embed_dim: 3
    n_embed: 8192
    ddconfig:
      double_z: False
      z_channels: 3
      resolution: 256
      in_channels: 3
      out_ch: 3
      ch: 128
      ch_mult:
      - 1
      - 2
      - 4
      num_res_blocks: 2
      attn_resolutions: []
      dropout: 0.0
      padding_mode: zeros

data:
  train:
    type: paired
    params:
      he_path: /scratch/antwerpen/212/vsc21211/sinsr/mist_PR/train/input
      ihc_path: /scratch/antwerpen/212/vsc21211/sinsr/mist_PR/train/target
      gt_size: 256
      split: train
      mean: 0.5
      std: 0.5
  val:
    type: paired
    params:
      he_path: /scratch/antwerpen/212/vsc21211/sinsr/mist_PR/val/input
      ihc_path: /scratch/antwerpen/212/vsc21211/sinsr/mist_PR/val/target
      gt_size: 256
      split: val
      mean: 0.5
      std: 0.5

train:
  learn_xT: False
  finetune_use_gt: 1.

  lr: 5e-5
  batch: [4, 4]
  use_fp16: True
  microbatch: 4
  seed: 123456
  global_seeding: False
  prefetch_factor: 4
  num_workers: 4
  ema_rate: 0.999
  iterations: 1038
  milestones: [100, 1038]
  weight_decay: 0
  save_freq: 1038
  val_freq: 1038
  log_freq: [50, 1038, 1]
  save_images: True
  use_ema_val: True